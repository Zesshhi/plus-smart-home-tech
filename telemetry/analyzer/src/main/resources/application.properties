spring.application.name=analyzer

spring.datasource.url=jdbc:postgresql://localhost:5432/analyzer
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

telemetry.analyzer.kafka.bootstrap-servers=localhost:9092

telemetry.analyzer.kafka.consumer.snapshot.topic=telemetry.snapshots.v1
telemetry.analyzer.kafka.consumer.snapshot.group-id=analyzer.snapshots

telemetry.analyzer.kafka.consumer.hub-events.topic=telemetry.hubs.v1
telemetry.analyzer.kafka.consumer.hub-events.group-id=analyzer.hub-events

grpc.client.hub-router.address=static://localhost:59090
grpc.client.hub-router.enableKeepAlive=true
grpc.client.hub-router.keepAliveWithoutCalls=true
grpc.client.hub-router.negotiationType=plaintext
