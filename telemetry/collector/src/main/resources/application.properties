spring.application.name=collector
spring.config.import=optional:configserver:
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.useRandomPolicy=true
spring.cloud.config.retry.max-interval=6000
spring.cloud.config.discovery.enabled=true
spring.cloud.config.discovery.serviceId=config-server

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=false

server.port=8080

grpc.server.port=59091

telemetry.collector.kafka.producer.bootstrap.servers=localhost:9092
telemetry.collector.kafka.producer.topic.hub-events=telemetry.hubs.v1
telemetry.collector.kafka.producer.topic.sensor-events=telemetry.sensors.v1
